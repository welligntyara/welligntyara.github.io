<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Animal de Estimação</title>
    <link rel="stylesheet" href="codigo_css.css">
</head>
<body>

    <header>
        <h1>Pet Cadastro</h1>
        <p>Cadastre o seu animal de estimação de forma rápida e fácil.</p>
    </header>

    <main>
        <form class="formulario">
            
            <label for="nome-pet">Nome do Pet:</label>
            <input type="text" id="nome-pet" name="nome_pet" class="campo-texto" required>

            <label for="especie">Espécie:</label>
            <select id="especie" name="especie">
                <option value="cachorro">Cachorro</option>
                <option value="gato">Gato</option>
                <option value="pave">Pássaro</option>
                <option value="outro">Outro</option>
            </select>

            <label for="data-nascimento">Data de Nascimento (Aproximada):</label>
            <input type="date" id="data-nascimento" name="data_nascimento">

            <label>Gênero:</label>
            <div class="grupo-radio">
                <input type="radio" id="macho" name="genero" value="macho">
                <label for="macho">Macho</label>
                
                <input type="radio" id="femea" name="genero" value="femea">
                <label for="femea">Fêmea</label>
            </div>

            <label for="email-dono">E-mail do Responsável:</label>
            <input type="email" id="email-dono" name="email_dono" class="campo-obrigatorio" required>

            <label for="observacoes">Observações/Cuidados Especiais:</label>
            <textarea id="observacoes" name="observacoes" rows="4"></textarea>

            <div class="grupo-checkbox">
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">Declaro que as informações acima são verdadeiras</label>
            </div>

            <button type="submit" class="botao-principal">Cadastrar Pet</button>
        </form>
    </main>

    <footer>
        <p>Desenvolvido por: [Welligntyara] e [Pedro Daniel]</p>
        <p>Data: Junho de 2026</p>
        <p>Disciplina: [progrsmsção web]</p>
    </footer>

</body>
</html>
